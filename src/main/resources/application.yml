spring:
  application:
    name: smart-book-finder
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

openlibrary:
  base-url: https://openlibrary.org
  connect-timeout-ms: 5000
  read-timeout-ms: 10000
  search-limit: 20

server:
  port: 8080
